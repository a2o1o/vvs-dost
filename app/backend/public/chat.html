<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>VVS Dost</title>
  <style>
    :root {
      --bg: #f4e7d3;
      --panel: #fbf3e8;
      --panel-strong: #fff8ef;
      --brand: #7a1023;
      --brand-soft: #b21e35;
      --ink: #2f211f;
      --muted: #8e5f57;
      --border: #dcc4ad;
      --shadow: 0 18px 32px rgba(122, 16, 35, 0.10);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #f8eddc 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 12px;
      gap: 10px;
    }
    .header {
      background: rgba(255, 248, 239, 0.9);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-row img {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      object-fit: contain;
      background: #f8eddc;
    }
    .brand-title {
      font-family: Georgia, serif;
      font-size: 24px;
      color: var(--brand);
      line-height: 1;
      margin: 0;
    }
    .brand-subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .chat-shell {
      min-height: 0;
      background: rgba(255, 248, 239, 0.82);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: 1fr;
    }
    .messages {
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }
    .empty {
      background: rgba(255,255,255,0.55);
      border: 1px dashed var(--border);
      border-radius: 18px;
      padding: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    .message { display: flex; }
    .message.user { justify-content: flex-end; }
    .bubble {
      max-width: 88%;
      border-radius: 18px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 18px rgba(122, 16, 35, 0.08);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
      font-size: 14px;
    }
    .message.assistant .bubble {
      background: var(--panel-strong);
      border-top-left-radius: 8px;
    }
    .message.user .bubble {
      background: #ecd2bf;
      color: var(--brand);
      border-top-right-radius: 8px;
    }
    .composer {
      background: rgba(255, 248, 239, 0.95);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      border: 1px solid var(--border);
      background: #f8eddc;
      color: var(--brand);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }
    textarea {
      width: 100%;
      min-height: 56px;
      max-height: 120px;
      resize: none;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: white;
      padding: 12px 14px;
      font: inherit;
      color: var(--ink);
      outline: none;
    }
    button.send {
      border: none;
      background: linear-gradient(180deg, var(--brand-soft), var(--brand));
      color: white;
      border-radius: 18px;
      padding: 0 18px;
      min-height: 56px;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 10px 18px rgba(122, 16, 35, 0.18);
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
    }
    .linklike {
      color: var(--brand);
      font-weight: 700;
      cursor: pointer;
    }
    .status { min-height: 16px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="brand-row">
        <img src="vvs-logo-icon.png" alt="VVS Dost">
        <div>
          <h1 class="brand-title">VVS Dost</h1>
          <p class="brand-subtitle">A red-and-beige student companion for questions about school, applications, internships, confidence, and what comes next.</p>
        </div>
      </div>
    </div>

    <div class="chat-shell">
      <div id="messages" class="messages"></div>
    </div>

    <div class="composer">
      <div class="chips">
        <button class="chip" data-prompt="I am confused about what stream or subjects I should choose next.">Subjects and streams</button>
        <button class="chip" data-prompt="How should I start preparing for college applications without feeling overwhelmed?">College applications</button>
        <button class="chip" data-prompt="I want to find internships or projects but I do not know where to begin.">Internships</button>
        <button class="chip" data-prompt="I feel behind compared to everyone else. Help me think clearly.">Confidence and pressure</button>
      </div>
      <div class="input-row">
        <textarea id="prompt" placeholder="Ask VVS Dost anything about school, college, internships, pressure, or planning your next step."></textarea>
        <button id="send" class="send">Send</button>
      </div>
      <div class="footer">
        <div id="status" class="status">Responses are generated directly in the app for this hackathon build.</div>
        <div id="reset" class="linklike">Start fresh</div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = 'AIzaSyAp1yYNi6YZkW3PacdqEicef2ElgcT4v3k';
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;
    const STORAGE_KEY = 'vvs-dost-chat-history';
    const messagesEl = document.getElementById('messages');
    const promptEl = document.getElementById('prompt');
    const sendEl = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const resetEl = document.getElementById('reset');
    let messages = [];

    function render() {
      if (!messages.length) {
        messagesEl.innerHTML = `
          <div class="empty">
            VVS Dost is here to help you think through student questions clearly and calmly. It is not therapy or emergency support. If you are in immediate danger, contact a trusted adult or local emergency service.
          </div>`;
        return;
      }
      messagesEl.innerHTML = messages.map((m) => `
        <div class="message ${m.role === 'user' ? 'user' : 'assistant'}">
          <div class="bubble">${escapeHtml(m.text)}</div>
        </div>`).join('');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function persist() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(messages)); } catch (e) {}
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        messages = raw ? JSON.parse(raw) : [];
      } catch (e) {
        messages = [];
      }
      render();
    }

    function makeRequestBody(userText) {
      const history = messages.slice(-8).map((m) => ({
        role: m.role === 'user' ? 'user' : 'model',
        parts: [{ text: m.text }]
      }));

      return {
        systemInstruction: {
          parts: [{
            text: 'You are VVS Dost, a calm and practical student support companion for Vasant Valley students. Help with school stress, college applications, internships, planning, confidence, and next steps. Be warm, concise, non-judgmental, and useful. Give structured guidance. Do not claim personal knowledge. Do not present yourself as a therapist, doctor, or crisis service. If the message suggests self-harm, abuse, violence, or immediate danger, tell the student to contact a trusted adult, parent, school counselor, or local emergency service immediately.'
          }]
        },
        contents: history.concat([{ role: 'user', parts: [{ text: userText }] }]),
        generationConfig: {
          temperature: 0.7,
          maxOutputTokens: 400
        }
      };
    }

    async function sendMessage(prefill) {
      const text = (prefill || promptEl.value).trim();
      if (!text) {
        statusEl.textContent = 'Type a message first.';
        return;
      }
      messages.push({ role: 'user', text });
      promptEl.value = '';
      render();
      persist();
      statusEl.textContent = 'VVS Dost is replying...';
      sendEl.disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(makeRequestBody(text))
        });
        const data = await response.json();
        const reply = data?.candidates?.[0]?.content?.parts?.map((p) => p.text || '').join('\n').trim();
        if (!response.ok || !reply) {
          throw new Error(data?.error?.message || 'The model did not return a usable reply.');
        }
        messages.push({ role: 'assistant', text: reply });
        statusEl.textContent = 'VVS Dost replied.';
      } catch (error) {
        messages.push({ role: 'assistant', text: 'I could not respond just now. Please try again in a moment.' });
        statusEl.textContent = `Request failed: ${error.message}`;
      } finally {
        sendEl.disabled = false;
        render();
        persist();
      }
    }

    document.querySelectorAll('.chip').forEach((chip) => {
      chip.addEventListener('click', () => sendMessage(chip.dataset.prompt || ''));
    });
    sendEl.addEventListener('click', () => sendMessage(''));
    promptEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage('');
      }
    });
    resetEl.addEventListener('click', () => {
      messages = [];
      persist();
      render();
      statusEl.textContent = 'Fresh start ready.';
    });

    load();
  </script>
</body>
</html>
