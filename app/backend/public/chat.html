<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>VVS Dost Chat</title>
  <style>
    :root {
      --bg: #f4e7d3;
      --panel: #fff8ef;
      --user: #ecd2bf;
      --brand: #7a1023;
      --brand-soft: #b21e35;
      --muted: #8e5f57;
      --ink: #2f211f;
      --border: #dcc4ad;
      --shadow: 0 10px 24px rgba(122, 16, 35, 0.10);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }
    #viewport {
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 8px;
      background: var(--bg);
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 248, 239, 0.96);
      box-shadow: var(--shadow);
      margin-bottom: 8px;
    }
    .header {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      border-radius: 10px;
      background: #f9efdf;
      flex: 0 0 auto;
    }
    .title {
      margin: 0;
      color: var(--brand);
      font-family: Georgia, serif;
      font-size: 24px;
      line-height: 1;
    }
    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      line-height: 1.3;
      font-size: 12px;
    }
    .info {
      padding: 10px 12px;
    }
    .info-title {
      margin: 0 0 4px;
      color: var(--brand);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .info-body {
      margin: 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 12px;
    }
    #chat {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 4px;
    }
    .empty {
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,0.55);
      color: var(--muted);
      line-height: 1.45;
    }
    .row {
      display: flex;
      width: 100%;
    }
    .row.assistant { justify-content: flex-start; }
    .row.user { justify-content: flex-end; }
    .bubble {
      max-width: 88%;
      padding: 9px 11px;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .row.assistant .bubble {
      background: var(--panel);
      border-top-left-radius: 6px;
    }
    .row.user .bubble {
      background: var(--user);
      color: var(--brand);
      border-top-right-radius: 6px;
    }
    .meta {
      margin-bottom: 2px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--brand-soft);
      line-height: 1.1;
    }
    .text {
      margin: 0;
      line-height: 1.36;
      white-space: pre-wrap;
      word-break: break-word;
    }
    @media (max-width: 420px) {
      .title { font-size: 22px; }
      .subtitle { font-size: 11px; }
      .bubble { max-width: 92%; }
    }
  </style>
</head>
<body>
  <div id="viewport">
    <div class="card header">
      <img src="vvs-logo-icon.jpg" alt="VVS Dost">
      <div>
        <h1 class="title">VVS Dost</h1>
        <p class="subtitle">A calm first-step support guide.</p>
      </div>
    </div>

    <div class="card info">
      <div class="info-title">What VVS Dost does</div>
      <p class="info-body">Short, calm help for school stress, friendship issues, overwhelm, loneliness, and asking for help clearly.</p>
    </div>

    <div id="chat"></div>
  </div>

  <script>
    const DELIMITER = "<<<MSG>>>";
    const viewport = document.getElementById("viewport");
    const chatRoot = document.getElementById("chat");
    let lastTranscript = null;

    function readTranscript() {
      try {
        if (window.AppInventor && typeof window.AppInventor.getWebViewString === "function") {
          return window.AppInventor.getWebViewString() || "";
        }
      } catch (err) {}
      return "";
    }

    function parseMessages(transcript) {
      return String(transcript || "")
        .split(DELIMITER)
        .map((part) => part.replace(/^\s+|\s+$/g, ""))
        .filter(Boolean)
        .map((part) => {
          if (part.startsWith("You: ")) {
            return { sender: "user", label: "You", text: part.slice(5) };
          }
          if (part.startsWith("VVS Dost: ")) {
            return { sender: "assistant", label: "VVS Dost", text: part.slice(10) };
          }
          return { sender: "assistant", label: "VVS Dost", text: part };
        });
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function render(transcript) {
      const messages = parseMessages(transcript);
      if (!messages.length) {
        chatRoot.innerHTML = '<div class="empty">Start the conversation below.</div>';
        return;
      }

      chatRoot.innerHTML = messages.map((message) =>
        `<div class="row ${message.sender}">
          <div class="bubble">
            <div class="meta">${message.label}</div>
            <div class="text">${escapeHtml(message.text)}</div>
          </div>
        </div>`
      ).join("");

      requestAnimationFrame(() => {
        viewport.scrollTop = viewport.scrollHeight;
      });
    }

    function tick() {
      const transcript = readTranscript();
      if (transcript !== lastTranscript) {
        lastTranscript = transcript;
        render(transcript);
      }
    }

    render("");
    setInterval(tick, 250);
  </script>
</body>
</html>
