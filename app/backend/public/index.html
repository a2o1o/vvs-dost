<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI2A Custom GPT Gateway</title>
    <style>
      :root {
        --bg: #f6efe4;
        --panel: #fffaf2;
        --ink: #14213d;
        --accent: #e76f51;
        --accent-2: #264653;
        --border: #d8c8af;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, #ffe7c2 0, transparent 28%),
          linear-gradient(135deg, #f6efe4 0%, #efe0c8 100%);
        min-height: 100vh;
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 40px auto;
        background: color-mix(in srgb, var(--panel) 94%, white);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 16px 50px rgba(20, 33, 61, 0.12);
        overflow: hidden;
      }

      header {
        padding: 24px;
        background: linear-gradient(135deg, var(--accent-2), #365f73);
        color: white;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 2.7rem);
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      .content {
        padding: 24px;
        display: grid;
        gap: 16px;
      }

      label {
        font-weight: 700;
        display: grid;
        gap: 8px;
      }

      textarea,
      input,
      button {
        font: inherit;
      }

      textarea,
      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        background: white;
      }

      textarea {
        min-height: 150px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 20px;
        background: var(--accent);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      .answer {
        white-space: pre-wrap;
        border: 1px solid var(--border);
        background: white;
        border-radius: 16px;
        padding: 16px;
        min-height: 120px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      @media (max-width: 700px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>AI2A Gateway</h1>
        <p>Local test page for the App Inventor client and the protected OpenAI backend.</p>
      </header>
      <section class="content">
        <div class="row">
          <label>
            Access token
            <input id="token" placeholder="Matches APP_ACCESS_TOKEN">
          </label>
          <label>
            User ID
            <input id="userId" placeholder="student-1">
          </label>
        </div>

        <label>
          Message
          <textarea id="message" placeholder="Ask something..."></textarea>
        </label>

        <button id="send">Send</button>

        <div id="answer" class="answer">Response will appear here.</div>
      </section>
    </main>

    <script>
      const tokenInput = document.getElementById("token");
      const userIdInput = document.getElementById("userId");
      const messageInput = document.getElementById("message");
      const answer = document.getElementById("answer");
      const sendButton = document.getElementById("send");

      sendButton.addEventListener("click", async () => {
        answer.textContent = "Loading...";

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-app-token": tokenInput.value.trim()
            },
            body: JSON.stringify({
              message: messageInput.value,
              userId: userIdInput.value,
              sessionId: "browser-demo"
            })
          });

          const data = await response.json();
          answer.textContent = data.reply || data.error || "No output.";
        } catch (error) {
          answer.textContent = error.message;
        }
      });
    </script>
  </body>
  </html>
