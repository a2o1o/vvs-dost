server {
    server_name maitriaspire.org www.maitriaspire.org;

    root /var/www/maitriweb;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }

    location /sakhi-api/ {
        proxy_pass http://127.0.0.1:39001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/maitriaspire.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/maitriaspire.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.maitriaspire.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = maitriaspire.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name maitriaspire.org www.maitriaspire.org;
    return 404; # managed by Certbot
}
